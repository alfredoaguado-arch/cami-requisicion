<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CAMI - Requisicion de Pago</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#EFEFED;font-family:'Courier New',monospace;min-height:100vh;padding:1.5rem 1rem}
  .container{max-width:800px;margin:0 auto;background:#fff;border:0.5px solid #d3d1c7;border-radius:10px;overflow:hidden}
  .masthead{background:#1a1a18;display:flex;align-items:center;justify-content:space-between;padding:14px 2rem}
  .masthead img{height:52px;width:auto;display:block}
  .masthead-right{text-align:right}
  .masthead-right .doc-title{font-size:11px;color:#888780;letter-spacing:.1em;text-transform:uppercase}
  .masthead-right .doc-sub{font-size:16px;font-weight:700;color:#fff;margin-top:2px}
  .form-body{padding:1.5rem 2rem}
  .info-box{background:#f5f3ee;border:0.5px solid #d3d1c7;border-radius:6px;padding:10px 14px;font-size:12px;color:#888780;margin-bottom:1.25rem;line-height:1.6}
  .section{margin-bottom:1.25rem}
  .section-title{font-size:11px;font-weight:700;color:#4A4A48;letter-spacing:.1em;text-transform:uppercase;border-bottom:0.5px solid #d3d1c7;padding-bottom:8px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
  .fl{font-size:11px;color:#888780;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;display:block}
  .req{color:#A32D2D}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  input,select,textarea{width:100%;padding:9px 11px;border:0.5px solid #d3d1c7;border-radius:6px;font-family:'Courier New',monospace;font-size:13px;background:#fafaf8;color:#1a1a18;outline:none;transition:border .15s}
  input:focus,select:focus,textarea:focus{border-color:#4A4A48;background:#fff}
  input.invalid{border-color:#A32D2D !important;background:#FCEBEB !important}
  input.valid{border-color:#3B6D11 !important;background:#EAF3DE !important}
  .field-hint{font-size:10px;margin-top:3px;min-height:14px}
  .field-hint.err{color:#A32D2D}
  .field-hint.ok{color:#3B6D11}
  .field-hint.info{color:#888780}
  .conceptos-wrap{overflow-x:auto;margin-bottom:.75rem}
  .conceptos-table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
  .conceptos-table th{background:#f5f3ee;color:#888780;font-weight:400;letter-spacing:.06em;text-transform:uppercase;padding:8px;text-align:left;border-bottom:0.5px solid #d3d1c7;font-size:10px;white-space:nowrap}
  .conceptos-table td{padding:5px;border-bottom:0.5px solid #EFEFED;vertical-align:top}
  .conceptos-table td input,.conceptos-table td select{padding:6px 7px;font-size:11px}
  .col-concepto{width:20%}.col-tipo{width:14%}.col-banco{width:11%}
  .col-cuenta{width:15%}.col-monto{width:9%}.col-receptor{width:16%}
  .col-empresa{width:11%}.col-del{width:4%}
  .cell-hint{font-size:9px;margin-top:2px;min-height:12px}
  .cell-hint.err{color:#A32D2D}
  .cell-hint.ok{color:#3B6D11}
  .cell-hint.info{color:#888780}
  .btn-add{background:#EFEFED;color:#4A4A48;border:0.5px solid #D3D1C7;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Courier New',monospace}
  .btn-add:hover{background:#D3D1C7}
  .btn-del{background:none;border:none;color:#d3d1c7;font-size:16px;cursor:pointer;padding:0 4px}
  .btn-del:hover{color:#A32D2D}
  .total-row{text-align:right;font-size:13px;color:#4A4A48;padding:8px 0;font-weight:700;border-top:0.5px solid #d3d1c7;margin-top:4px}
  .btn-row{display:flex;gap:10px;margin-top:.5rem}
  .btn-submit{flex:1;padding:13px;background:#4A4A48;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.04em;transition:background .15s}
  .btn-submit:hover{background:#333331}
  .btn-submit:disabled{background:#d3d1c7;cursor:not-allowed}
  .toast{display:none;padding:10px 16px;border-radius:6px;font-size:12px;margin-top:10px;line-height:1.6;white-space:pre-line}
  .toast.show{display:block}
  .toast.ok{background:#EAF3DE;color:#3B6D11;border:0.5px solid #C0DD97}
  .toast.err{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F7C1C1}
  @media(max-width:580px){
    .form-body{padding:1rem}
    .grid2,.grid3{grid-template-columns:1fr}
    .btn-row{flex-direction:column}
    .masthead{padding:12px 1rem}
    .masthead img{height:38px}
  }
</style>
</head>

    <div class="info-box">Todos los campos marcados con <span style="color:#A32D2D">*</span> son obligatorios antes de enviar.</div>
    <div class="section">
      <div class="section-title">Datos del solicitante</div>
      <div class="grid3">
        <div>
          <label class="fl">Nombre <span class="req">*</span></label>
          <input type="text" id="sol-nombre" placeholder="Nombre completo"/>
        </div>
        <div>
          <label class="fl">WhatsApp <span class="req">*</span></label>
          <input type="tel" id="sol-whatsapp" placeholder="10 digitos" maxlength="10"/>
          <div class="field-hint info" id="hint-wa">10 digitos sin espacios</div>
        </div>
        <div>
          <label class="fl">Fecha <span class="req">*</span></label>
          <input type="date" id="req-fecha"/>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Proyecto</div>
      <div class="grid2">
        <div>
          <label class="fl">Proyecto <span class="req">*</span></label>
          <select id="req-proyecto"><option value="">Cargando...</option></select>
        </div>
        <div>
          <label class="fl">Observaciones generales</label>
          <input type="text" id="req-obs" placeholder="Notas adicionales (opcional)"/>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">
        <span>Conceptos a pagar <span class="req">*</span></span>
        <button class="btn-add" onclick="addConcepto()">+ Agregar concepto</button>
      </div>
      <div class="conceptos-wrap">
        <table class="conceptos-table">
          <thead><tr>
            <th class="col-concepto">Concepto *</th>
            <th class="col-tipo">Tipo de gasto *</th>
            <th class="col-banco">Banco *</th>
            <th class="col-cuenta">No. Cuenta / Tarjeta / CLABE *</th>
            <th class="col-monto">Monto *</th>
            <th class="col-receptor">Receptor *</th>
            <th class="col-empresa">Empresa *</th>
            <th class="col-del"></th>
          </tr></thead>
          <tbody id="conceptos-rows"></tbody>
        </table>
      </div>
      <div class="total-row" id="total-row">Total: $0.00</div>
    </div>
    <div class="btn-row">
      <button class="btn-submit" id="btn-enviar" onclick="enviarRequisicion()">Enviar Requisicion</button>
    </div>
    <div class="toast" id="toast-req"></div>
  </div>
</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxH0xusW4qYt2WCU6rQNU8XaCL9f7tw_ygqT4WQs2FC4xsZwqU0ghrJ3U-HQ1aAR0lp/exec';

const BANCOS = [
  'BBVA','Banamex','Santander','Banorte','HSBC',
  'Scotiabank','Inbursa','Afirme','Bajio','Azteca',
  'Compartamos','Multiva','Mifel','Ve por Mas','Otro'
];

const BANCO_RULES = {
  BBVA: {
    hint: 'BBVA: 10 digitos (cuenta) o 16 digitos (tarjeta)',
    validate: v => v.length === 10 || v.length === 16,
    errMsg: 'BBVA requiere 10 digitos (cuenta) o 16 digitos (tarjeta)'
  },
  default: {
    hint: '16 digitos (tarjeta) o 18 digitos (CLABE)',
    validate: v => v.length === 16 || v.length === 18,
    errMsg: 'Ingresa 16 digitos (tarjeta) o 18 digitos (CLABE)'
  }
};

function getBancoRule(banco) {
  return BANCO_RULES[banco] || BANCO_RULES.default;
}

document.getElementById('req-fecha').value = new Date().toISOString().split('T')[0];

async function cargarProyectos() {
  const sel = document.getElementById('req-proyecto');
  try {
    const res  = await fetch(SCRIPT_URL + '?accion=listaProyectos');
    const data = await res.json();
    if (data.proyectos && data.proyectos.length) {
      sel.innerHTML = '<option value="">Seleccionar proyecto</option>';
      data.proyectos.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        sel.appendChild(opt);
      });
    }
  } catch(e) {
    sel.innerHTML = '<option value="">Error al cargar</option>';
  }
}
cargarProyectos();

function crearFilaConcepto() {
  const tr = document.createElement('tr');
  const bancoOpts = '<option value="">Banco</option>' +
    BANCOS.map(b => '<option value="' + b + '">' + b + '</option>').join('');
  tr.innerHTML =
    '<td class="col-concepto"><input type="text" placeholder="Descripcion"/></td>' +
    '<td class="col-tipo"><select>' +
      '<option value="">Tipo</option>' +
      '<option>Nomina</option><option>Subcontrato</option><option>Materiales</option>' +
      '<option>Consumibles</option><option>Herramienta / Equipo</option>' +
      '<option>Indirecto Oficina</option><option>Indirecto Obra</option>' +
      '<option>SAT / IMSS</option><option>Otro</option>' +
    '</select></td>' +
    '<td class="col-banco"><select onchange="onBancoChange(this)">' + bancoOpts + '</select></td>' +
    '<td class="col-cuenta">' +
      '<input type="text" placeholder="Selecciona banco" disabled ' +
             'style="background:#f5f3ee;color:#b4b2a9" oninput="validarCuenta(this)" maxlength="18"/>' +
      '<div class="cell-hint info" id=""></div>' +
    '</td>' +
    '<td class="col-monto"><input type="number" placeholder="0.00" step="0.01" min="0.01" oninput="actualizarTotal()"/></td>' +
    '<td class="col-receptor"><input type="text" placeholder="Nombre receptor"/></td>' +
    '<td class="col-empresa"><input type="text" placeholder="Empresa"/></td>' +
    '<td class="col-del"><button class="btn-del" onclick="delRow(this)">x</button></td>';
  return tr;
}

function addConcepto() {
  document.getElementById('conceptos-rows').appendChild(crearFilaConcepto());
  actualizarTotal();
}

function delRow(btn) {
  const rows = document.querySelectorAll('#conceptos-rows tr');
  if (rows.length > 1) { btn.closest('tr').remove(); actualizarTotal(); }
  else showToast('req','Debe haber al menos un concepto.','err');
}

function onBancoChange(sel) {
  const tr       = sel.closest('tr');
  const cuentaEl = tr.querySelector('.col-cuenta input');
  const hintEl   = tr.querySelector('.col-cuenta .cell-hint');
  const banco    = sel.value;
  if (!banco) {
    cuentaEl.disabled = true;
    cuentaEl.value = '';
    cuentaEl.placeholder = 'Selecciona banco';
    cuentaEl.style.background = '#f5f3ee';
    cuentaEl.style.color = '#b4b2a9';
    cuentaEl.className = '';
    hintEl.textContent = '';
    return;
  }
  const rule = getBancoRule(banco);
  cuentaEl.disabled = false;
  cuentaEl.value = '';
  cuentaEl.placeholder = banco === 'BBVA' ? '10 o 16 digitos' : '16 o 18 digitos';
  cuentaEl.style.background = '';
  cuentaEl.style.color = '';
  cuentaEl.className = '';
  hintEl.textContent = rule.hint;
  hintEl.className = 'cell-hint info';
}

function validarCuenta(input) {
  const tr     = input.closest('tr');
  const banco  = tr.querySelector('.col-banco select').value;
  const hintEl = tr.querySelector('.col-cuenta .cell-hint');
  const val    = input.value.replace(/\D/g,'');
  input.value  = val;
  if (!banco || !val) {
    input.className = '';
    hintEl.textContent = banco ? getBancoRule(banco).hint : '';
    hintEl.className = 'cell-hint info';
    return;
  }
  const rule = getBancoRule(banco);
  if (rule.validate(val)) {
    input.className = 'valid';
    hintEl.textContent = 'Numero valido';
    hintEl.className = 'cell-hint ok';
  } else {
    input.className = 'invalid';
    hintEl.textContent = rule.errMsg;
    hintEl.className = 'cell-hint err';
  }
  actualizarTotal();
}

function actualizarTotal() {
  const total = Array.from(document.querySelectorAll('#conceptos-rows .col-monto input'))
    .reduce((a,i) => a + (parseFloat(i.value)||0), 0);
  document.getElementById('total-row').textContent =
    'Total: $' + total.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function showToast(id, msg, tipo) {
  const t = document.getElementById('toast-' + id);
  t.textContent = msg;
  t.className = 'toast show ' + tipo;
  setTimeout(() => t.classList.remove('show'), 6000);
}

function validarFormulario() {
  const errores = [];
  if (!document.getElementById('sol-nombre').value.trim())     errores.push('Nombre del solicitante');
  const wa = document.getElementById('sol-whatsapp').value.replace(/\D/g,'');
  if (wa.length !== 10)   errores.push('WhatsApp (10 digitos exactos)');
  if (!document.getElementById('req-fecha').value)             errores.push('Fecha');
  if (!document.getElementById('req-proyecto').value)          errores.push('Proyecto');

  const filas = document.querySelectorAll('#conceptos-rows tr');
  if (!filas.length) { errores.push('Al menos un concepto'); return errores; }

  filas.forEach((tr, i) => {
    const n    = i + 1;
    const cols = tr.querySelectorAll('input,select');
    const concepto = cols[0].value.trim();
    const tipo     = cols[1].value;
    const banco    = cols[2].value;
    const cuenta   = cols[3].value.replace(/\D/g,'');
    const monto    = parseFloat(cols[4].value)||0;
    const receptor = cols[5].value.trim();
    const empresa  = cols[6].value.trim();

    if (!concepto)  errores.push('Concepto ' + n + ': descripcion');
    if (!tipo)      errores.push('Concepto ' + n + ': tipo de gasto');
    if (!banco)     errores.push('Concepto ' + n + ': banco');
    if (!receptor)  errores.push('Concepto ' + n + ': nombre del receptor');
    if (!empresa)   errores.push('Concepto ' + n + ': empresa');
    if (monto <= 0) errores.push('Concepto ' + n + ': monto mayor a cero');
    if (banco && !cuenta) {
      errores.push('Concepto ' + n + ': numero de cuenta/tarjeta/CLABE');
    } else if (banco && cuenta) {
      const rule = getBancoRule(banco);
      if (!rule.validate(cuenta)) errores.push('Concepto ' + n + ': ' + rule.errMsg);
    }
  });
  return errores;
}

function getConceptos() {
  return Array.from(document.querySelectorAll('#conceptos-rows tr')).map(tr => {
    const cols = tr.querySelectorAll('input,select');
    return {
      concepto:  cols[0].value.trim(),
      tipo:      cols[1].value,
      banco:     cols[2].value,
      cuenta:    cols[3].value.replace(/\D/g,''),
      monto:     parseFloat(cols[4].value)||0,
      receptor:  cols[5].value.trim(),
      empresa:   cols[6].value.trim(),
    };
  });
}

async function enviarRequisicion() {
  const errores = validarFormulario();
  if (errores.length) {
    showToast('req',
      'Campos pendientes:\n- ' + errores.slice(0,5).join('\n- ') +
      (errores.length > 5 ? '\n... y ' + (errores.length-5) + ' mas' : ''),
      'err');
    return;
  }
  const btn = document.getElementById('btn-enviar');
  btn.disabled = true; btn.textContent = 'Enviando...';
  const timeout = setTimeout(() => {
    btn.disabled = false; btn.textContent = 'Enviar Requisicion';
    showToast('req','El servidor tardo demasiado. Intenta de nuevo.','err');
  }, 25000);

  const folio    = 'REQ-' + Date.now().toString().slice(-6);
  const conceptos = getConceptos();
  const payload  = {
    tipo_registro: 'REQUISICION',
    folio,
    fecha:         document.getElementById('req-fecha').value,
    solicitante:   document.getElementById('sol-nombre').value.trim(),
    whatsapp:      document.getElementById('sol-whatsapp').value.replace(/\D/g,''),
    proyecto:      document.getElementById('req-proyecto').value,
    observaciones: document.getElementById('req-obs').value.trim(),
    conceptos:     JSON.stringify(conceptos),
    total:         conceptos.reduce((a,c) => a+c.monto, 0).toFixed(2),
    timestamp:     new Date().toISOString()
  };
  try {
    const fd = new FormData();
    Object.keys(payload).forEach(k => fd.append(k, payload[k]));
    const res = await fetch(SCRIPT_URL, {method:'POST', body:fd});
    const txt = await res.text();
    clearTimeout(timeout);
    if (txt.includes('OK') || txt.includes('ok')) {
      showToast('req',
        'Requisicion ' + folio + ' enviada. Recibiras confirmacion por Telegram cuando sea aprobada.',
        'ok');
      btn.textContent = 'Enviada';
      setTimeout(() => { btn.disabled=false; btn.textContent='Enviar Requisicion'; }, 5000);
    } else {
      showToast('req','Error: ' + txt,'err');
      btn.disabled=false; btn.textContent='Enviar Requisicion';
    }
  } catch(e) {
    clearTimeout(timeout);
    showToast('req','Error de conexion: ' + e.message,'err');
    btn.disabled=false; btn.textContent='Enviar Requisicion';
  }
}

// Init
document.getElementById('conceptos-rows').appendChild(crearFilaConcepto());

document.getElementById('sol-whatsapp').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g,'').slice(0,10);
  const hint = document.getElementById('hint-wa');
  if (this.value.length === 10) {
    hint.textContent = 'Numero valido';
    hint.className = 'field-hint ok';
  } else {
    hint.textContent = this.value.length + '/10 digitos';
    hint.className = 'field-hint ' + (this.value.length > 0 ? 'err' : 'info');
  }
});
</script>
</body>
</html>
